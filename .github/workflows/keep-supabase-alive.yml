name: Keep Supabase Alive

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping Supabase Database
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "❌ Error: NEXT_PUBLIC_SUPABASE_URL secret is missing in GitHub repository settings!"
            exit 1
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "❌ Error: NEXT_PUBLIC_SUPABASE_ANON_KEY secret is missing in GitHub repository settings!"
            echo "Please add NEXT_PUBLIC_SUPABASE_ANON_KEY under Settings > Secrets and variables > Actions in your GitHub repository."
            exit 1
          fi

          echo "Pinging Supabase REST API..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/projects?select=id&limit=1" \
            -H "apikey: $NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $NEXT_PUBLIC_SUPABASE_ANON_KEY")

          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS\:.*//g')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "Response Body: $BODY"
          echo "HTTP Status Code: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Supabase successfully pinged!"
          else
            echo "❌ Ping failed with HTTP status code $STATUS"
            exit 1
          fi
